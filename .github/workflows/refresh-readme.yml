name: Refresh README stats

on:
  schedule:
    - cron: '0 */6 * * *'  
  workflow_dispatch:        # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bust cache on streak-stats URL
        run: |
          TS=$(date +%s)
          sed -i -E "s|(streak-stats\.demolab\.com[^\"]*)&cb=[0-9]*|\1\&cb=${TS}|" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats cache"
          git push
